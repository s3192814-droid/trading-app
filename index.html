<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Signal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1c1c1e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 25px;
        }

        select {
            background: #2c2c2e;
            color: white;
            border: 1px solid #3a3a3c;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 20px;
            outline: none;
            appearance: none;
            text-align: center;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #007aff, #005ecb);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 30px;
            display: none;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .signal-type {
            font-size: 48px;
            font-weight: 900;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .buy { color: #30d158; text-shadow: 0 0 20px rgba(48, 209, 88, 0.4); }
        .sell { color: #ff453a; text-shadow: 0 0 20px rgba(255, 69, 58, 0.4); }

        .details {
            background: #2c2c2e;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .detail-row:last-child { margin-bottom: 0; }
        .label { color: #8e8e93; }
        .value { font-weight: 600; }

        .loader {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #48484a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Торговый Сигнал</h1>
    <p class="subtitle">Выберите время и получите сигнал</p>

    <select id="expiration">
        <option value="5 сек">⏱️ 5 секунд</option>
        <option value="15 сек">⏱️ 15 секунд</option>
        <option value="1 мин">⏱️ 1 минута</option>
        <option value="5 мин">⏱️ 5 минут</option>
        <option value="15 мин">⏱️ 15 минут</option>
        <option value="30 мин">⏱️ 30 минут</option>
        <option value="1 час">⏱️ 1 час</option>
    </select>

    <button id="actionBtn" onclick="generateSignal()">ПОЛУЧИТЬ СИГНАЛ</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div style="color: #8e8e93; font-size: 14px;">Анализ рынка...</div>
    </div>

    <div class="result-box" id="result">
        <div class="signal-type" id="signalText">BUY</div>
        <div class="details">
            <div class="detail-row">
                <span class="label">Пара:</span>
                <span class="value" id="pairValue">BTC/USDT</span>
            </div>
            <div class="detail-row">
                <span class="label">Экспирация:</span>
                <span class="value" id="expValue">5 мин</span>
            </div>
            <div class="detail-row">
                <span class="label">Вероятность:</span>
                <span class="value" id="probValue">87%</span>
            </div>
        </div>
    </div>

    <div class="footer">Не является финансовой рекомендацией</div>
</div>

<script>
    // Инициализация Telegram
    const tg = window.Telegram.WebApp;
    tg.expand();
    if (tg.colorScheme === 'dark') {
        document.body.style.backgroundColor = getComputedStyle(document.body).getPropertyValue('--tg-theme-bg-color') || '#1c1c1e';
    }

    const pairs = [
        'EUR/USD', 'GBP/USD', 'USD/JPY', 'USD/CHF', 'AUD/USD', 'USD/CAD', 'NZD/USD', 
        'EUR/GBP', 'EUR/JPY', 'GBP/JPY', 'EUR/CHF', 'EUR/AUD', 'GBP/CHF', 'GBP/AUD', 
        'AUD/JPY', 'CHF/JPY', 'NZD/JPY', 'CAD/JPY', 'AUD/CAD', 'AUD/CHF', 'AUD/NZD', 
        'CAD/CHF', 'EUR/CAD', 'EUR/NZD', 'GBP/CAD', 'GBP/NZD', 'NZD/CAD', 'NZD/CHF',
        'BTC/USDT', 'ETH/USDT', 'XRP/USDT', 'LTC/USDT', 'BCH/USDT', 'ADA/USDT', 
        'DOT/USDT', 'LINK/USDT', 'BNB/USDT', 'SOL/USDT', 'DOGE/USDT', 'MATIC/USDT', 
        'AVAX/USDT', 'ATOM/USDT', 'UNI/USDT', 'TON/USDT'
    ];

    function generateSignal() {
        const btn = document.getElementById('actionBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const expirationSelect = document.getElementById('expiration');

        // Сброс UI
        result.style.display = 'none';
        btn.disabled = true;
        btn.style.opacity = '0.5';
        loader.style.display = 'block';

        // Вибрация (если в Telegram)
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

        // Имитация задержки (1.5 секунды)
        setTimeout(() => {
            const isBuy = Math.random() > 0.5;
            const signalType = isBuy ? 'BUY' : 'SELL';
            const signalClass = isBuy ? 'buy' : 'sell';
            const emoji = isBuy ? '🟢' : '🔴';
            
            const randomPair = pairs[Math.floor(Math.random() * pairs.length)];
            const selectedExp = expirationSelect.value;
            const probability = Math.floor(Math.random() * (99 - 75 + 1)) + 75;

            // Обновление данных
            const signalTextEl = document.getElementById('signalText');
            signalTextEl.textContent = `${emoji} ${signalType}`;
            signalTextEl.className = `signal-type ${signalClass}`;

            document.getElementById('pairValue').textContent = randomPair;
            document.getElementById('expValue').textContent = selectedExp;
            document.getElementById('probValue').textContent = `${probability}%`;

            // Показ результата
            loader.style.display = 'none';
            result.style.display = 'block';
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.textContent = 'ЕЩЁ РАЗ';

            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

        }, 1500);
    }
</script>

</body>
</html>
